<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FacturaAI — Iniciar sesión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .logo span { color: #34d399; }

    .subtitulo {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #34d399; }

    .boton {
      width: 100%;
      background: #34d399;
      color: #0f172a;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      padding: 13px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .boton:hover { background: #10b981; }

    .boton-invitado {
      width: 100%;
      background: transparent;
      color: #94a3b8;
      font-size: 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 11px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .boton-invitado:hover {
      border-color: #94a3b8;
      color: #f1f5f9;
    }

    .enlace {
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }

    .enlace a {
      color: #34d399;
      text-decoration: none;
      font-weight: 600;
    }

    .error {
      background: #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Factura<span>AI</span></div>
    <div class="subtitulo">Inicia sesión para continuar</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com"/>

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••"/>

    <div class="error" id="error"></div>

    <button class="boton" id="boton">Entrar</button>

    <a href="/app" class="boton-invitado">Continuar como invitado →</a>

    <div class="enlace">
      ¿No tienes cuenta? <a href="/registro">Regístrate gratis</a>
    </div>
  </div>

  <script>
    document.getElementById("boton").addEventListener("click", async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("error");

      if (!email || !password) {
        errorDiv.textContent = "Por favor rellena todos los campos";
        errorDiv.style.display = "block";
        return;
      }

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, contraseña: password })
      });

      const data = await res.json();

      if (data.ok) {
        window.location.href = "/";
      } else {
        errorDiv.textContent = data.error;
        errorDiv.style.display = "block";
      }
    });
  </script>
</body>
</html>
